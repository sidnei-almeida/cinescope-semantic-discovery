<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="projectorGold" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f2dfb2" />
      <stop offset="45%" stop-color="#d7b25a" />
      <stop offset="100%" stop-color="#b88924" />
    </linearGradient>
    <linearGradient id="beamGlow" x1="0" y1="16" x2="10" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d7b25a" stop-opacity="0" />
      <stop offset="100%" stop-color="#d7b25a" stop-opacity="0.35" />
    </linearGradient>
  </defs>

  <!-- projected light -->
  <path d="M9 16 2.5 11.2v9.6L9 16Z" fill="url(#beamGlow)" />
  <path
    d="M9 16 1.5 10.5M9 16 1.5 16M9 16 1.5 21.5"
    stroke="#d7b25a"
    stroke-width="0.85"
    stroke-linecap="round"
    opacity="0.45"
  />

  <!-- top film reel -->
  <circle cx="19" cy="8.5" r="3.2" stroke="url(#projectorGold)" stroke-width="1.15" />
  <circle cx="19" cy="8.5" r="1.1" fill="#d7b25a" opacity="0.55" />
  <path
    d="M19 5.8v5.4M16.2 8.5h5.6M17.1 6.4l3.8 4.2M20.9 6.4l-3.8 4.2"
    stroke="#d7b25a"
    stroke-width="0.65"
    stroke-linecap="round"
    opacity="0.5"
  />

  <!-- body -->
  <path
    d="M9.5 11.5h14.5a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2H9.5a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2Z"
    stroke="url(#projectorGold)"
    stroke-width="1.25"
  />
  <path d="M11 14.5h11M11 17h9" stroke="#d7b25a" stroke-width="0.7" opacity="0.35" stroke-linecap="round" />

  <!-- lens housing -->
  <circle cx="9" cy="16" r="4" stroke="url(#projectorGold)" stroke-width="1.2" />
  <circle cx="9" cy="16" r="2.1" fill="#d7b25a" fill-opacity="0.22" stroke="#f2dfb2" stroke-width="0.75" />

  <!-- base -->
  <path d="M11.5 22.5v2.2M20.5 22.5v2.2" stroke="#b88924" stroke-width="1.15" stroke-linecap="round" />
  <path
    d="M10 24.7h12"
    stroke="url(#projectorGold)"
    stroke-width="1"
    stroke-linecap="round"
    opacity="0.85"
  />
</svg>
